name: clazy.

on:
  push:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '!docs/building-cmake.md'
      - 'changelog.txt'
      - 'LEGAL'
      - 'LICENSE'
      - '.github/**'
      - '!.github/workflows/clazy.yml'
      - 'snap/**'
      - 'Telegram/build/**'
      - 'Telegram/Patches/**'
      - 'Telegram/Resources/uwp/**'
      - 'Telegram/Resources/winrc/**'
      - 'Telegram/SourceFiles/platform/win/**'
      - 'Telegram/SourceFiles/platform/mac/**'
      - 'Telegram/Telegram/**'
      - 'Telegram/configure.bat'
      - 'Telegram/Telegram.plist'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '!docs/building-cmake.md'
      - 'changelog.txt'
      - 'LEGAL'
      - 'LICENSE'
      - '.github/**'
      - '!.github/workflows/clazy.yml'
      - 'snap/**'
      - 'Telegram/build/**'
      - 'Telegram/Patches/**'
      - 'Telegram/Resources/uwp/**'
      - 'Telegram/Resources/winrc/**'
      - 'Telegram/SourceFiles/platform/win/**'
      - 'Telegram/SourceFiles/platform/mac/**'
      - 'Telegram/Telegram/**'
      - 'Telegram/configure.bat'
      - 'Telegram/Telegram.plist'

jobs:

  clazy:
    name: CentOS 7
    runs-on: ubuntu-latest
    container:
      image: docker.pkg.github.com/telegramdesktop/tdesktop/centos_env
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    env:
      UPLOAD_ARTIFACT: "false"

    steps:
      - name: Get repository name.
        run: echo "REPO_NAME=${GITHUB_REPOSITORY##*/}" >> $GITHUB_ENV

      - name: Clone.
        uses: actions/checkout@v2
        with:
          submodules: recursive
          path: ${{ env.REPO_NAME }}

      - name: Install dependencies.
        run: |
          yum -y install llvm-toolset-7.0 llvm-toolset-7.0-clang-devel llvm-toolset-7.0-llvm-devel

      - name: First set up.
        shell: scl enable llvm-toolset-7.0 -- bash --noprofile --norc -eo pipefail {0}
        run: |
          clang --version
          ln -s $LibrariesPath Libraries

      - name: clazy.
        shell: scl enable llvm-toolset-7.0 -- bash --noprofile --norc -eo pipefail {0}
        run: |
          git clone -b v1.9 --depth=1 https://github.com/KDE/clazy
          cd clazy

          cmake -B build -GNinja -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)
          cmake --build build --target install

      - name: Telegram Desktop build.
        shell: scl enable llvm-toolset-7.0 -- scl enable devtoolset-8 -- bash --noprofile --norc -eo pipefail {0}
        run: |
          cd $REPO_NAME/Telegram

          DEFINE=""
          if [ -n "${{ matrix.defines }}" ]; then
            DEFINE="-D ${{ matrix.defines }}=ON"
            echo Define from matrix: $DEFINE
            echo "ARTIFACT_NAME=Telegram_${{ matrix.defines }}" >> $GITHUB_ENV
          else
            echo "ARTIFACT_NAME=Telegram" >> $GITHUB_ENV
          fi

          ./configure.sh \
          -D CMAKE_CXX_COMPILER=clazy \
          -D CMAKE_C_FLAGS="-Wno-unknown-pragmas -Werror" \
          -D CMAKE_CXX_FLAGS="-Wno-unknown-warning-option -Werror" \
          -D CMAKE_EXE_LINKER_FLAGS="-s" \
          -D TDESKTOP_API_TEST=ON \
          -D DESKTOP_APP_USE_PACKAGED=OFF \
          -D DESKTOP_APP_DISABLE_CRASH_REPORTS=OFF

          export CLAZY_CHECKS="level0,level1,no-connect-3arg-lambda,no-container-anti-pattern,no-detaching-temporary,no-non-pod-global-static,no-range-loop,no-strict-iterators"
          export CLAZY_IGNORE_DIRS=".*(Telegram/ThirdParty|cmake/external).*"
          cmake --build ../out/Debug -j$(nproc) 2>&1 | tee ../log.txt

      - name: Check.
        run: |
          filePath="$REPO_NAME/out/Debug/bin/Telegram"
          if test -f "$filePath"; then
            if grep -q 'warning:' "$REPO_NAME/log.txt"; then
              grep 'warning:' "$REPO_NAME/log.txt" | sort -u | sed -r 's/^.* (\[-W.*\])/\1/' | sort | uniq -c | sort -n
              exit 1
            else
              echo "Build successfully done! :)"

              size=$(stat -c %s "$filePath")
              echo "File size of ${filePath}: ${size} Bytes."
            fi
          else
            echo "Build error, output file does not exist."
            exit 1
          fi

      - name: Move artifact.
        if: env.UPLOAD_ARTIFACT == 'true'
        run: |
          cd $REPO_NAME/out/Debug/bin
          mkdir artifact
          mv Telegram artifact/
      - uses: actions/upload-artifact@master
        if: env.UPLOAD_ARTIFACT == 'true'
        name: Upload artifact.
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.REPO_NAME }}/out/Debug/bin/artifact/
